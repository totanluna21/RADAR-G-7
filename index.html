<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RADAR G-7 — Crypto Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{height:100vh;background:#020b14;color:#c8e8ff;font-family:'Exo 2',sans-serif;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#010810;}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.25);border-radius:2px;}
input,textarea{outline:none;}
input::placeholder,textarea::placeholder{color:#1a4060;}

/* Header */
.header{background:linear-gradient(180deg,#030f1c,rgba(2,11,20,0.97));border-bottom:1px solid rgba(0,212,255,0.12);padding:10px 15px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:20;}
.radar{position:relative;width:76px;height:76px;flex-shrink:0;}
.r-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;}
.r-sweep{position:absolute;top:50%;left:50%;width:38px;height:38px;transform-origin:0 0;animation:rSweep 3s linear infinite;background:conic-gradient(from 0deg,rgba(0,212,255,0.25) 0deg,transparent 50deg);border-radius:0 100% 0 0;}
.r-dot{position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;background:#00d4ff;box-shadow:0 0 12px #00d4ff;transform:translate(-50%,-50%);}
.r-blip{position:absolute;width:5px;height:5px;border-radius:50%;animation:bPop 3s ease-in-out infinite;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:20px;letter-spacing:4px;color:#00d4ff;animation:glow 3s ease-in-out infinite;}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:8px;color:#2a6080;letter-spacing:2px;margin-top:3px;}
.badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.badge{font-family:'Share Tech Mono',monospace;font-size:8px;padding:2px 7px;background:rgba(0,0,0,0.3);letter-spacing:1px;border:1px solid;}

/* Search */
.search-area{background:rgba(0,6,18,0.96);border-bottom:1px solid rgba(0,212,255,0.1);padding:9px 14px;flex-shrink:0;z-index:15;}
.search-row{display:flex;gap:8px;align-items:center;}
.search-input{flex:1;background:rgba(0,18,34,0.9);border:1px solid rgba(0,212,255,0.25);color:#c8e8ff;font-family:'Exo 2',sans-serif;font-size:13px;padding:9px 12px;}
.btn-search{background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,150,200,0.15));border:1px solid rgba(0,212,255,0.5);color:#00d4ff;font-family:'Orbitron',monospace;font-size:10px;padding:0 16px;height:42px;cursor:pointer;letter-spacing:2px;white-space:nowrap;}
.btn-search:disabled{background:rgba(0,212,255,0.03);border-color:rgba(0,212,255,0.1);color:#1a4060;cursor:not-allowed;}
.quick-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;align-items:center;}
.tag{background:rgba(0,212,255,0.03);border:1px solid rgba(0,212,255,0.13);color:#3a7090;font-family:'Share Tech Mono',monospace;font-size:9px;padding:2px 8px;cursor:pointer;transition:all .15s;}
.tag:hover{color:#00d4ff;border-color:rgba(0,212,255,0.4);}

/* Quick buttons */
.quick-btns{background:rgba(0,4,10,0.8);border-bottom:1px solid rgba(0,212,255,0.07);padding:7px 12px;display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;z-index:10;}
.qbtn{background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.12);color:#4a8fa8;font-family:'Exo 2',sans-serif;font-size:10px;padding:5px 10px;cursor:pointer;transition:all .15s;}
.qbtn:hover:not(:disabled){background:rgba(0,212,255,0.1);color:#00d4ff;}
.qbtn:disabled{opacity:0.4;cursor:not-allowed;}

/* CHAT — THIS IS THE KEY FIX */
.chat-wrapper{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.chat{flex:1;overflow-y:scroll;padding:14px 12px;-webkit-overflow-scrolling:touch;}
.chat-inner{max-width:900px;margin:0 auto;padding-bottom:10px;}

/* Messages */
.msg{display:flex;margin-bottom:12px;animation:fadeUp 0.3s ease-out;}
.msg.user{justify-content:flex-end;}
.msg.bot{justify-content:flex-start;}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.av.bot{background:linear-gradient(135deg,#001e2e,#003050);border:1px solid rgba(0,212,255,0.4);font-family:'Orbitron',monospace;font-size:7px;font-weight:700;color:#00d4ff;margin-right:7px;box-shadow:0 0 10px rgba(0,212,255,0.15);}
.av.user{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.22);font-size:13px;margin-left:7px;}
.bubble{border-radius:12px;padding:12px 14px;font-size:13px;line-height:1.65;}
.bubble.user{background:linear-gradient(135deg,rgba(0,212,255,0.13),rgba(0,100,180,0.09));border:1px solid rgba(0,212,255,0.3);border-radius:12px 2px 12px 12px;max-width:72%;color:#c8e8ff;}
.bubble.bot{background:linear-gradient(180deg,rgba(0,15,25,0.93),rgba(0,8,18,0.97));border:1px solid rgba(0,212,255,0.11);border-radius:2px 12px 12px 12px;max-width:88%;color:#b8d8e8;}

/* Signal styles */
.sig-pump{display:inline-block;background:rgba(0,255,136,0.12);border:1px solid rgba(0,255,136,0.55);color:#00ff88;padding:3px 12px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;margin:4px 0;border-radius:2px;animation:sPulse 2s infinite;}
.sig-dump{display:inline-block;background:rgba(255,51,51,0.12);border:1px solid rgba(255,51,51,0.55);color:#ff4444;padding:3px 12px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;margin:4px 0;border-radius:2px;animation:sPulse 2s infinite;}
.sig-alert{display:inline-block;background:rgba(255,204,0,0.1);border:1px solid rgba(255,204,0,0.55);color:#ffcc00;padding:3px 12px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;margin:4px 0;border-radius:2px;}
.sig-watch{display:inline-block;background:rgba(68,170,255,0.08);border:1px solid rgba(68,170,255,0.45);color:#44aaff;padding:3px 12px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;margin:4px 0;border-radius:2px;}
.line-div{height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.28),transparent);margin:8px 0;}
.line-sec{font-family:'Share Tech Mono',monospace;font-size:9px;color:#4a8fa8;letter-spacing:1.5px;margin:8px 0 4px;border-left:2px solid rgba(0,212,255,0.35);padding-left:7px;}
.line-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:#00d4ff;letter-spacing:1.5px;margin:4px 0;}
.line-bull{color:#00ff88;font-size:12px;margin:2px 0;font-weight:600;}
.line-bear{color:#ff5555;font-size:12px;margin:2px 0;font-weight:600;}
.line-arrow{color:#8ab8cc;font-size:12px;padding-left:11px;margin:2px 0;border-left:1px solid rgba(0,212,255,0.2);}
.line-hist{background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.12);padding:4px 9px;margin:3px 0;font-size:12px;color:#a8d8e8;border-radius:2px;}
.line-conv{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#ffcc00;margin:7px 0;}
.line-disc{color:#336677;font-size:10px;margin-top:8px;font-family:'Share Tech Mono',monospace;}
.line-circ{font-family:'Share Tech Mono',monospace;font-size:11px;color:#88ccdd;margin:3px 0;}
.line-gap{height:4px;}
.line-txt{font-size:13px;color:#b8d8e8;margin:1px 0;line-height:1.65;}

/* Loading */
.loading-msg{display:flex;justify-content:flex-start;margin-bottom:12px;}
.loading-bubble{background:linear-gradient(180deg,rgba(0,15,25,0.93),rgba(0,8,18,0.97));border:1px solid rgba(0,212,255,0.11);border-radius:2px 12px 12px 12px;padding:12px 16px;display:flex;align-items:center;gap:12px;}
.spinner{width:24px;height:24px;border-radius:50%;border:2px solid rgba(0,212,255,0.15);border-top:2px solid #00d4ff;animation:spin 0.8s linear infinite;flex-shrink:0;}
.loading-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:#00d4ff;letter-spacing:2px;}
.loading-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:#2a5a70;margin-top:3px;}

/* Input */
.input-area{background:linear-gradient(0deg,#010810,rgba(1,8,16,0.97));border-top:1px solid rgba(0,212,255,0.12);padding:10px 12px;flex-shrink:0;z-index:20;}
.input-row{max-width:900px;margin:0 auto;display:flex;gap:8px;align-items:flex-end;}
.input-wrap{flex:1;background:rgba(0,18,34,0.9);border:1px solid rgba(0,212,255,0.18);}
.input-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:#1a4a60;letter-spacing:2px;padding:4px 10px 0;}
.input-wrap textarea{background:transparent;border:none;color:#c8e8ff;font-family:'Exo 2',sans-serif;font-size:13px;padding:6px 10px 8px;width:100%;resize:none;}
.btn-scan{background:linear-gradient(135deg,rgba(0,212,255,0.18),rgba(0,150,200,0.12));border:1px solid rgba(0,212,255,0.45);color:#00d4ff;font-family:'Orbitron',monospace;font-size:9px;font-weight:700;padding:0 14px;height:60px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;min-width:64px;flex-shrink:0;}
.btn-scan:disabled{background:rgba(0,212,255,0.03);border-color:rgba(0,212,255,0.08);color:#1a4a60;cursor:not-allowed;}
.footer-txt{max-width:900px;margin:4px auto 0;font-family:'Share Tech Mono',monospace;font-size:8px;color:#1a4060;text-align:right;}

@keyframes rSweep{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes rPulse{0%,100%{opacity:.5}50%{opacity:.1}}
@keyframes bPop{0%{opacity:0;transform:scale(0)}40%{opacity:1;transform:scale(1.4)}100%{opacity:.2;transform:scale(.8)}}
@keyframes glow{0%,100%{text-shadow:0 0 18px #00d4ffaa,0 0 35px #00d4ff22}50%{text-shadow:0 0 28px #00d4ffcc,0 0 55px #00d4ff44}}
@keyframes sPulse{0%,100%{box-shadow:0 0 5px currentColor}50%{box-shadow:0 0 18px currentColor,0 0 35px currentColor}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>

<div class="chat-wrapper">

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <div class="input-wrap">
      <div class="input-label">◈ PREGUNTA LIBRE</div>
      <textarea id="chatInput" rows="2" placeholder="¿Qué crypto va a pumpear? / Analiza el mercado / Señales de dump..."></textarea>

      <span style="font-size:16px">🛰️</span>
      <span>SCAN</span>
    </button>
  </div>
  <div class="footer-txt">ENTER enviar · RADAR G-7 · CoinGecko · CMC · DexScreener · Anthropic AI</div>
</div>

<script>
// ── KB ──
const KB = `CASOS HISTÓRICOS RADAR G-7:
1) RAVE DAO Abr2026: $0.25→$28(+6000%) en 9 días → -95% en 48h. Supply 90% insiders, pump sin catalizador, Vol/MCap artificial. $6B destruidos. REGLA: supply concentrado + pump sin catalizador = DUMP INMINENTE.
2) Momentum MMT Nov2025: TGE Binance+OKX → +4000% en horas → -86% en días. REGLA: listing top exchange = pump casi seguro + corrección -80%.
3) Luna Terra May2022: $119→$0.0003 en 4 días. APY 19.5% insostenible, MCap(LUNA)<Outstanding(UST). $50B destruidos. REGLA: stablecoin algorítmica + yield alto sin colateral = bomba de tiempo.
SEÑALES PUMP: Vol/MCap>15% súbito, precio lateral+vol bajo, +3% en 1H sin noticias, listing Binance/OKX, RSI<30 rebotando.
SEÑALES DUMP: Vol/MCap>30% precio estancado, pump>200% sin catalizador, supply>70% pocas wallets, RSI>80+divergencia bajista.`;

const FORMAT = `
Responde con este formato:
━━━━━━━━━━━━━━━━━━━━━━━━
🛰️ RADAR G-7 — ANÁLISIS
━━━━━━━━━━━━━━━━━━━━━━━━
📌 ACTIVO: [nombre] ($SYM)
💰 PRECIO: $[real] | 24H: [%] | 7D: [%]
◈ SEÑAL: [PUMP INMINENTE 🟢 / DUMP INMINENTE 🔴 / ALERTA ALTA ⚠️ / VIGILANCIA 👁 / NEUTRO ⚪]
◈ SCORE: [X]/10 | PROB: [X%]
◈ VENTANA: [tiempo]
━━━ MÉTRICAS ━━━
MCap: $[real] | Vol24H: $[real] | Vol/MCap: [%]
ATH: $[real] | Desde ATH: [%]
━━━ HISTÓRICO ━━━
📁 Caso similar: [RAVE DAO / Momentum MMT / Luna Terra / otro]
━━━ SEÑALES ━━━
🔺 BULLISH: → [señal] → [señal]
🔻 BEARISH: → [señal] → [señal]
━━━ ESTRATEGIA ━━━
🎯 TARGET: $[precio] (+[%]) | 🛑 STOP: $[precio] (-[%])
⚖️ R/R: [X:1]
━━━ VEREDICTO ━━━
[3 líneas concretas]
CONVICCIÓN: [X]/10
⚠️ Informativo. DYOR.`;

const PROMPTS = {
  scan: `Busca en CoinGecko top gainers y losers de hoy. Identifica las 5 cryptos con mayor probabilidad de pump o dump ahora mismo. Para cada una: señal, precio, cambio 24H. ${FORMAT}`,
  pump: `Busca en CoinGecko top gainers hoy. ¿Cuáles tienen señales de PUMP más fuertes? ${FORMAT}`,
  dump: `Busca en CoinGecko top losers hoy. ¿Cuáles están en mayor riesgo de DUMP? ${FORMAT}`,
  meme: `Busca datos de DOGE, SHIB, PEPE, BONK, FLOKI ahora. ¿Cuáles tienen señal de pump o dump? ${FORMAT}`,
  dex: `Busca en DexScreener los tokens más trending ahora. Lista top 5 con señales de pump o dump. ${FORMAT}`,
  market: `Busca el estado actual del mercado crypto: market cap total, dominancia BTC, Fear & Greed Index, tendencia general.`
};
const LABELS = {scan:'📡 Escanear mercado',pump:'🟢 Top pumps hoy',dump:'🔴 Riesgo dump',meme:'🔥 Memecoins',dex:'📊 DexScreener',market:'🌐 Estado mercado'};

// ── STATE ──
let busy = false;
let history = [];

// ── RADAR ──
function buildRadar() {
  const el = document.getElementById('radarEl');
  [1,.72,.46,.26].forEach((s,i) => {
    const d = document.createElement('div');
    d.className = 'r-ring';
    const sz = 76*s;
    d.style.cssText = `width:${sz}px;height:${sz}px;border:1px solid rgba(0,212,255,${.07+i*.05});animation:rPulse ${2+i*.4}s ease-in-out infinite;animation-delay:${i*.25}s`;
    el.appendChild(d);
  });
  ['horizontal','vertical'].forEach(dir => {
    const l = document.createElement('div');
    l.style.cssText = dir==='horizontal'
      ? 'position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(0,212,255,.06);transform:translateY(-50%)'
      : 'position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(0,212,255,.06);transform:translateX(-50%)';
    el.appendChild(l);
  });
  const sw = document.createElement('div');
  sw.className = 'r-sweep';
  el.appendChild(sw);
  [['22%','62%','.4s','#00ff88'],['62%','32%','1.3s','#ff4444'],['40%','25%','2.1s','#ffcc00']].forEach(([t,l,d,c]) => {
    const b = document.createElement('div');
    b.className = 'r-blip';
    b.style.cssText = `top:${t};left:${l};background:${c};box-shadow:0 0 7px ${c};animation-delay:${d}`;
    el.appendChild(b);
  });
  const dot = document.createElement('div');
  dot.className = 'r-dot';
  el.appendChild(dot);
}

// ── RENDER BOT MESSAGE ──
function renderBot(text) {
  const wrap = document.createElement('div');
  text.split('\n').forEach(line => {
    let el;
    if (!line.trim()) { el = document.createElement('div'); el.className='line-gap'; }
    else if (line.includes('RADAR G-7 —')||line.includes('🛰️ RADAR')) { el = document.createElement('div'); el.className='line-title'; el.textContent=line; }
    else if (line.startsWith('━━━━')) { el = document.createElement('div'); el.className='line-div'; }
    else if (line.startsWith('━━━')) { el = document.createElement('div'); el.className='line-sec'; el.textContent=line; }
    else if (line.includes('PUMP INMINENTE')) { el = document.createElement('div'); el.className='sig-pump'; el.textContent=line; }
    else if (line.includes('DUMP INMINENTE')) { el = document.createElement('div'); el.className='sig-dump'; el.textContent=line; }
    else if (line.includes('ALERTA ALTA')) { el = document.createElement('div'); el.className='sig-alert'; el.textContent=line; }
    else if (line.includes('VIGILANCIA')) { el = document.createElement('div'); el.className='sig-watch'; el.textContent=line; }
    else if (line.includes('CONVICCIÓN')) { el = document.createElement('div'); el.className='line-conv'; el.textContent=line; }
    else if (line.startsWith('🔺')) { el = document.createElement('div'); el.className='line-bull'; el.textContent=line; }
    else if (line.startsWith('🔻')) { el = document.createElement('div'); el.className='line-bear'; el.textContent=line; }
    else if (line.trim().startsWith('→')) { el = document.createElement('div'); el.className='line-arrow'; el.textContent=line; }
    else if (line.startsWith('📁')) { el = document.createElement('div'); el.className='line-hist'; el.textContent=line; }
    else if (line.startsWith('⚠️')) { el = document.createElement('div'); el.className='line-disc'; el.textContent=line; }
    else if (line.startsWith('◈')) { el = document.createElement('div'); el.className='line-circ'; el.textContent=line; }
    else { el = document.createElement('div'); el.className='line-txt'; el.textContent=line; }
    wrap.appendChild(el);
  });
  return wrap;
}

// ── ADD MESSAGE ──
function addMsg(role, content) {
  const inner = document.getElementById('chatInner');
  const msgEl = document.createElement('div');
  msgEl.className = `msg ${role}`;
  if (role === 'bot') {
    const av = document.createElement('div'); av.className='av bot'; av.textContent='G7';
    msgEl.appendChild(av);
  }
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  if (role === 'user') { bubble.textContent = content; }
  else { bubble.appendChild(renderBot(content)); }
  msgEl.appendChild(bubble);
  if (role === 'user') {
    const av = document.createElement('div'); av.className='av user'; av.textContent='👤';
    msgEl.appendChild(av);
  }
  inner.appendChild(msgEl);
  history.push({ role: role==='bot'?'assistant':'user', content });
  scrollBottom();
}

function showLoader() {
  const inner = document.getElementById('chatInner');
  const ld = document.createElement('div');
  ld.className = 'loading-msg'; ld.id = 'loader';
  ld.innerHTML = `<div class="av bot">G7</div><div class="loading-bubble"><div class="spinner"></div><div><div class="loading-text">ESCANEANDO...</div><div class="loading-sub">CoinGecko · CoinMarketCap · DexScreener</div></div></div>`;
  inner.appendChild(ld);
  scrollBottom();
}

function hideLoader() { const l = document.getElementById('loader'); if(l) l.remove(); }

function scrollBottom() {
  setTimeout(() => {
    const chat = document.getElementById('chatEl');
    chat.scrollTop = chat.scrollHeight;
  }, 50);
}

function setUI(disabled) {
  busy = disabled;
  document.getElementById('sBtn').disabled = disabled;
  document.getElementById('sendBtn').disabled = disabled;
  document.getElementById('sInput').disabled = disabled;
  document.getElementById('chatInput').disabled = disabled;
  document.querySelectorAll('.qbtn').forEach(b => b.disabled = disabled);
}

// ── API CALL ──
async function callAI(userMsg) {
  const msgs = [...history, { role:'user', content: userMsg }];
  const res = await fetch('/api/ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 1000,
      system: `Eres RADAR G-7, analista crypto de élite. Usa web_search para datos reales. Responde en español. ${KB}`,
      messages: msgs,
      tools: [{ type:'web_search_20250305', name:'web_search' }]
    })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const d = await res.json();
  if (d.error) throw new Error(d.error.message || JSON.stringify(d.error));
  return (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim() || 'Sin respuesta.';
}

async function send(prompt, display) {
  if (busy) return;
  setUI(true);
  document.getElementById('sInput').value = '';
  document.getElementById('chatInput').value = '';
  addMsg('user', display || prompt.slice(0,60));
  showLoader();
  try {
    const reply = await callAI(prompt);
    hideLoader();
    addMsg('bot', reply);
  } catch(e) {
    hideLoader();
    addMsg('bot', `⚠️ Error: ${e.message}\n\nIntenta de nuevo.`);
  } finally {
    setUI(false);
  }
}

function doSearch() {
  const v = document.getElementById('sInput').value.trim();
  if (!v || busy) return;
  send(`Busca datos reales de "${v}" en CoinGecko y CoinMarketCap AHORA. Precio actual, cambio 1H/24H/7D, market cap, volumen. Análisis completo pump/dump.${FORMAT}`, `Analizar: ${v}`);
}

function searchCoin(coin) {
  if (busy) return;
  send(`Busca datos reales de ${coin} en CoinGecko y CMC ahora mismo. Análisis completo pump/dump.${FORMAT}`, `Analizar: ${coin}`);
}

function quickAction(type) {
  if (busy) return;
  send(PROMPTS[type], LABELS[type]);
}

function sendChat() {
  const v = document.getElementById('chatInput').value.trim();
  if (!v || busy) return;
  send(`${v}${FORMAT}`, v);
}

  buildRadar();
  const wb = document.getElementById('welcomeBubble');
  wb.appendChild(renderBot('🛰️ RADAR G-7 — SISTEMA ACTIVO\n\nSistema operacional con datos en tiempo real.\n◈ CoinGecko + CoinMarketCap + DexScreener vía Web Search\n◈ Base histórica: RAVE DAO · Momentum MMT · Luna Terra\n\n━━━ USA EL BUSCADOR ━━━\n→ Escribe cualquier crypto y presiona ANALIZAR\n→ O usa los botones de escaneo rápido\n\n¿Qué quieres analizar?'));

  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
  document.getElementById('sInput').addEventListener('keydown', e => {
    if (e.key==='Enter') doSearch();
  });
});
</script>
