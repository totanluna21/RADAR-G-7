function buildRadar() {
  const r = document.getElementById('radarScope');
  const rings = [{s:1,o:0.12},{s:0.72,o:0.17},{s:0.46,o:0.22},{s:0.26,o:0.27}];

  });

  dot.className = 'r-dot';

      el = document.createElement('div'); el.className='line-conv'; el.textContent=line;

    } else if (line.trim().startsWith('→')) {
      el = document.createElement('div'); el.className='line-arrow'; el.textContent=line;
    } else if (line.startsWith('📁')) {
      el = document.createElement('div'); el.className='line-hist'; el.textContent=line;
    } else if (line.startsWith('⚠️')) {
      el = document.createElement('div'); el.className='line-disc'; el.textContent=line;
    } else if (line.startsWith('◈')) {
      el = document.createElement('div'); el.className='line-circ'; el.textContent=line;
    } else {
      el = document.createElement('div'); el.style.cssText='font-size:13px;color:#b8d8e8;margin:1px 0'; el.textContent=line;
    }
    div.appendChild(el);
  });
  return div;
}

function addMessage(role, content) {
  const chatInner = document.getElementById('chatInner');
  const msgDiv = document.createElement('div');
  msgDiv.className = `msg ${role}`;
  const av = document.createElement('div');
  if (role === 'bot') {
    av.className = 'avatar bot-av';
    av.textContent = 'G7';
    msgDiv.appendChild(av);
  }
  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.appendChild(renderBotText(content));
  }
  msgDiv.appendChild(bubble);
  if (role === 'user') {
    const uAv = document.createElement('div');
    uAv.className = 'avatar user-av';
    uAv.textContent = '👤';
    msgDiv.appendChild(uAv);
  }
  chatInner.appendChild(msgDiv);
  messages.push({role: role === 'bot' ? 'assistant' : 'user', content});
  scrollDown();
  return bubble;
}

function showLoading() {
  const chatInner = document.getElementById('chatInner');
  const ld = document.createElement('div');
  ld.className = 'loading-msg';
  ld.id = 'loadingMsg';
  ld.innerHTML = `
    <div class="avatar bot-av">G7</div>
    <div class="loading-bubble">
      <div class="spinner"></div>
      <div>
        <div class="loading-text">ESCANEANDO...</div>
        <div class="loading-sub">CoinGecko · CoinMarketCap · DexScreener</div>
      </div>
    </div>`;
  chatInner.appendChild(ld);
  scrollDown();
}

function hideLoading() {
  const ld = document.getElementById('loadingMsg');
  if (ld) ld.remove();
}

function scrollDown() {
  setTimeout(() => {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }, 100);
}

function setLoading(val) {
  loading = val;
  document.getElementById('searchBtn').disabled = val;
  document.getElementById('sendBtn').disabled = val;
  document.getElementById('searchInput').disabled = val;
  document.getElementById('chatInput').disabled = val;
  document.querySelectorAll('.qbtn').forEach(b => b.disabled = val);
  document.querySelectorAll('.tag').forEach(t => t.style.pointerEvents = val ? 'none' : 'auto');
}

// ─── API CALL ───
async function callAI(userMsg) {
  const key = ANTHROPIC_KEY || window._ANTHROPIC_KEY || '';
  if (!key) throw new Error('API key no configurada. Añade VITE_ANTHROPIC_KEY en Netlify.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: `Eres RADAR G-7, analista crypto de élite. Usa web_search para datos reales. Responde en español. ${KB}`,
      messages: [...messages, {role:'user',content:userMsg}],
      tools: [{type:'web_search_20250305',name:'web_search'}]
    })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim() || 'Sin respuesta.';
}

async function sendPrompt(prompt, display) {
  if (loading) return;
  setLoading(true);
  addMessage('user', display || prompt.slice(0,60));
  showLoading();
  try {
    const reply = await callAI(prompt);
    hideLoading();
    addMessage('bot', reply);
  } catch(e) {
    hideLoading();
    addMessage('bot', `⚠️ Error: ${e.message}\n\nIntenta de nuevo.`);
  } finally {
    setLoading(false);
  }
}

// ─── ACTIONS ───
